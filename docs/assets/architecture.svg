<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">XYZ-scrcpy Architecture</title>
  <desc id="desc">High-level architecture with launcher, checks, monitor service, menu, and scrcpy process.</desc>
  <defs>
    <style>
      .bg { fill: #111827; }
      .panel { fill: #1f2937; stroke: #4b5563; stroke-width: 2; rx: 12; }
      .text { fill: #e5e7eb; font-family: Arial, sans-serif; font-size: 16px; }
      .title { fill: #a3e635; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; }
      .accent { stroke: #a3e635; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a3e635"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="900" height="360"/>
  <text class="title" x="24" y="36">XYZ-scrcpy Runtime Architecture</text>

  <rect class="panel" x="30" y="70" width="250" height="80"/>
  <text class="text" x="48" y="103">User Alias Launcher</text>
  <text class="text" x="48" y="126">(custom command alias)</text>

  <rect class="panel" x="330" y="70" width="250" height="80"/>
  <text class="text" x="350" y="103">launch_with_checks.sh</text>
  <text class="text" x="350" y="126">check + repair gateway</text>

  <rect class="panel" x="630" y="70" width="240" height="80"/>
  <text class="text" x="650" y="103">menu.py (interactive)</text>
  <text class="text" x="650" y="126">settings + device picker</text>

  <rect class="panel" x="120" y="220" width="300" height="90"/>
  <text class="text" x="142" y="256">scrcpy-auto.service</text>
  <text class="text" x="142" y="280">monitor.sh background loop</text>

  <rect class="panel" x="500" y="220" width="300" height="90"/>
  <text class="text" x="522" y="256">scrcpy process/window</text>
  <text class="text" x="522" y="280">active Android session</text>

  <path class="accent" d="M280 110 L330 110"/>
  <path class="accent" d="M580 110 L630 110"/>
  <path class="accent" d="M270 260 L500 260"/>
  <path class="accent" d="M250 150 L250 220"/>
  <path class="accent" d="M720 150 L720 220"/>
</svg>
