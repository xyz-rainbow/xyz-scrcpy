name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r .requirements.txt

      - name: Syntax check (Python)
        run: >
          python -m py_compile
          install_xyz.py win_path_shim.py adb_resolve.py repair_xyz.py
          bin/menu.py bin/config_loader.py bin/monitor.py
          bin/check_and_repair.py bin/launch_with_checks.py bin/install_tui.py
          bin/terminal_open.py

      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Bash syntax (stub scripts)
        if: runner.os != 'Windows'
        run: bash -n installer.sh bin/monitor.sh bin/check_and_repair.sh bin/launch_with_checks.sh scripts/clean_dev.sh

      - name: Install smoke (headless, Linux)
        if: runner.os != 'Windows'
        env:
          HOME: ${{ runner.temp }}/xyz-scrcpy-home
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          python3 install_xyz.py --action install --yes --no-open-terminal
          test -x "$HOME/.local/bin/xyz-scrcpy"
